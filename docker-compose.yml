services:

  # SQL Server
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sportsbooking-db
    environment:
      SA_PASSWORD: "${SA_PASSWORD}"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"         # expose to host so Rider/SSMS can still connect
    volumes:
      - sqlserver-data:/var/opt/mssql   # persist DB data across restarts
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost",
             "-U", "sa", "-P", "${SA_PASSWORD}", "-Q", "SELECT 1", "-No"]
      interval: 10s
      retries: 10
      start_period: 30s

  # .NET API
  api:
    build:
      context: ./backend    # Docker build context = backend/ folder
      dockerfile: Dockerfile
    container_name: sportsbooking-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=SportsBookingDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True"
      JwtSettings__Secret: "${JWT_SECRET}"
      JwtSettings__Issuer: "SportsBookingSystem"
      JwtSettings__Audience: "SportsBookingSystemUsers"
      JwtSettings__ExpiryMinutes: "60"
      AllowedOrigins__0: "http://localhost:4200"
    ports:
      - "5000:8080"         # host:container — API reachable at localhost:5000
    volumes:
      - uploads-data:/app/wwwroot/uploads   # persist uploaded avatars
    depends_on:
      db:
        condition: service_healthy  # wait for DB to be ready before starting API
    restart: unless-stopped

  # Angular Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sportsbooking-frontend
    ports:
      - "4200:80"           # nginx inside container serves on port 80
    depends_on:
      - api
    restart: unless-stopped


volumes:
  sqlserver-data:
  uploads-data: